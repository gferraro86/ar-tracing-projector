<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>AR Tracing Projector</title>
  <link rel="stylesheet" href="/styles/app.css">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.update());
      });
    }
  </script>
</head>
<body>
  <!-- Screen 1: Image Picker -->
  <div id="screen-picker" class="screen active">
    <div class="picker-container">
      <h1>AR Tracing Projector</h1>
      <p class="subtitle">Proietta immagini su superfici reali</p>

      <div id="image-preview" class="preview hidden">
        <img id="preview-img" alt="Anteprima">
      </div>

      <label class="btn btn-secondary" for="image-input">
        Scegli Immagine
      </label>
      <input type="file" id="image-input" accept="image/*" hidden>

      <button id="btn-start-ar" class="btn btn-primary" disabled>
        Avvia AR
      </button>

      <p id="ar-error" class="error hidden"></p>
    </div>
  </div>

  <!-- AR DOM Overlay -->
  <div id="ar-overlay" class="hidden" onbeforexrselect="event.preventDefault()">

    <!-- Calibration phase: 4 draggable corners + Confirm + Exit -->
    <div id="ar-calibrate-ui">
      <p class="ar-instructions">Trascina i 4 punti sugli angoli del canvas</p>
      <div id="corner-handles-container"></div>
      <button id="btn-confirm" class="btn btn-confirm">Conferma</button>
      <button id="btn-exit-calibrate" class="btn-icon btn-icon-top-right" title="Esci">&times;</button>
    </div>

    <!-- Tracing phase: hidden menu, only handle visible -->
    <div id="ar-tracing-ui" class="hidden">
      <button id="tracing-menu-handle" class="btn-icon btn-icon-top-right" title="Menu">&#9776;</button>
      <div id="tracing-menu" class="hidden">
        <div class="opacity-control">
          <label for="opacity-slider">Opacit&agrave;</label>
          <input type="range" id="opacity-slider" min="0" max="100" value="40">
          <span id="opacity-value">40%</span>
        </div>
        <button id="btn-realign" class="btn btn-small btn-realign">Riallinea</button>
        <button id="btn-exit" class="btn btn-small btn-danger">Esci</button>
      </div>
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
